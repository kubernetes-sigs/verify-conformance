name: code quality check

on:
  push:
    branches:
      - '!main'
  pull_request: {}
  workflow_dispatch: {}

jobs:
  gobuild:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: '1.26.2'
          go-version-file: go.mod
          check-latest: true
          cache-dependency-path: go.sum
      - name: gobuild
        id: gobuild
        run: ./hack/verify-gobuild.sh
  gofmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: '1.26.2'
          go-version-file: go.mod
          check-latest: true
          cache-dependency-path: go.sum
      - name: gofmt
        id: gofmt
        run: ./hack/verify-gofmt.sh
  goimports:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: '1.26.2'
          go-version-file: go.mod
          check-latest: true
          cache-dependency-path: go.sum
      - name: goimports
        id: goimports
        run: ./hack/verify-goimports.sh
  golangci-lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: '1.26.2'
          go-version-file: go.mod
          check-latest: true
          cache: false
      - name: write .golangci.yml
        if: ${{ inputs.config }}
        run: |
          echo "Using config:"
          echo '${{ inputs.config }}' | tee .golangci.yml
      - name: golangci-lint
        uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20 # v9.2.0
        with:
          version: v2.11.4
          args: --timeout 10m
  golint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: '1.26.2'
          go-version-file: go.mod
          check-latest: true
          cache-dependency-path: go.sum
      - name: golint
        id: golint
        run: ./hack/verify-golint.sh
  gotest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: '1.26.2'
          go-version-file: go.mod
          check-latest: true
          cache-dependency-path: go.sum
      - name: gotest
        id: gotest
        run: ./hack/verify-gotest.sh
  govet:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: '1.26.2'
          go-version-file: go.mod
          check-latest: true
          cache-dependency-path: go.sum
      - name: govet
        id: govet
        run: ./hack/verify-govet.sh
  govulncheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: '1.26.2'
          go-version-file: go.mod
          check-latest: true
          cache-dependency-path: go.sum
      - name: govulncheck
        id: govulncheck
        run: ./hack/verify-govulncheck.sh
  spellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: '1.26.2'
          go-version-file: go.mod
          check-latest: true
          cache-dependency-path: go.sum
      - name: spellcheck
        id: spellcheck
        run: ./hack/verify-spellcheck.sh
